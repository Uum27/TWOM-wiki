<!DOCTYPE html>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>TWOM Wiki</title>
<style>
/* 全局样式重置 */
*{margin:0;padding:0;box-sizing:border-box;font-family:system-ui,sans-serif}
body{padding:8px;background:#f9f9f9;font-size:16px;}

/* 顶部搜索栏+语言切换栏 */
.top-bar{
  display:flex;gap:6px;margin-bottom:8px;
  position:sticky;top:0;background:#fff;padding:6px 0;z-index:10
}
.search-box{
  flex:1;padding:8px;border:1px solid #ccc;border-radius:8px;font-size:16px
}
.lang-btn,.page-btn{
  padding:8px;border:1px solid #ccc;background:#fff;border-radius:8px;white-space:nowrap;font-size:16px
}
.page-btn{margin:0 4px}

/* 地区分类按钮容器 */
.zone-bar {
  display:flex;flex-wrap:wrap;gap:3px;margin-bottom:8px;
  justify-content: center;
}
.zone-btn {
  flex:1 1 auto;min-width:90px;padding:6px 4px;text-align:center;
  white-space:nowrap;border:1px solid #ccc;background:#fff;border-radius:6px;font-size:14px;
}
/* 选中的分类按钮高亮 */
.zone-btn.active {background:#007aff;color:#fff;border-color:#007aff}

/* 分页按钮区域 */
.pagination{text-align:center;margin:8px 0}

/* ====================== 响应式布局 ====================== */
/* 手机端：1列 */
@media (max-width:767px) {
  .grid{
    display:grid;
    grid-template-columns:1fr;
    width:100%;
    gap:8px;
  }
}
/* 平板端：2列 */
@media (min-width:768px) and (max-width:1023px) {
  .grid{
    display:grid;
    grid-template-columns:1fr 1fr;
    width:100%;
    max-width:100%;
    margin:0 auto;
    gap:10px;
  }
}
/* PC端：3列 */
@media (min-width:1024px) {
  .grid{
    display:grid;
    grid-template-columns:repeat(3, 1fr);
    width:100%;
    max-width:100%;
    margin:0 auto;
    gap:12px;
  }
}

/* 单张怪物卡片 */
.card {
   background:#fff;border:1px solid #ddd;border-radius:10px;
   display:grid;
   grid-template-columns:80px 1fr;
   grid-template-rows:repeat(3, 1fr);
   grid-template-areas:
   "avatar drops"
   "info drops"
   "revive desc";
   overflow: hidden;
   min-height: 160px; /* 加高卡片底部区域 */
 }

/* 平板/PC左边加宽 */
@media (min-width:768px) {
  .card {
    grid-template-columns:90px 1fr;
    min-height: 170px; /* 平板/PC端进一步加高 */
  }
}

/* 左侧怪物头像区域 */
.avatar{
  grid-area:avatar;
  display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  border-right:1px solid #ddd;border-bottom:1px solid #ddd;
  padding:4px;
}
.avatar img{
  width:40px;height:40px;object-fit:contain;
}
.hp{font-size:14px;text-align:center;margin-top:6px}

/* 怪物名称/等级/地区信息 */
.info{
  grid-area:info;display:flex;flex-direction:column;
  justify-content:center;gap:3px;
  padding:4px;
  border-right:1px solid #ddd;border-bottom:1px solid #ddd;
  text-align:center;
}
.name{font-size:16px;font-weight:bold}
.level{font-size:14px;font-weight:bold}
.zone{font-size:13px;color:#4fad7e;}

/* ====================== 掉落物：左对齐 + 两列平分 ====================== */
.drops{
  grid-area:drops;
  padding:8px 10px;
  display:grid;
  grid-template-columns:1fr 1fr; /* 左右严格各占50% */
  gap:4px;
  align-content:center;
  font-size:14px;
  text-align:left;      /* 文字左对齐 */
  word-break:break-word;
  overflow:hidden;
}
.drops > div {
  display:flex;
  align-items:center;
  justify-content:flex-start; /* 内容左对齐 */
  gap:4px;
}
.drops img {
  width: 20px;
  height: 20px;
  flex-shrink:0;
  object-fit: contain;
}

/* 复活时间/EXP */
.revive{
  grid-area:revive;
  display:flex;
  flex-direction:column;
  justify-content:space-between; /* 上下分布 */
  padding:3px 4px; /* 上下3px内边距 */
  border-right:1px solid #ddd;
  background:#eef7ff;
  font-size:13px;
  text-align:center;
}
/* EXP 顶部间距 */
.revive .exp {
  margin-top: 4px;
}
/* 复活时间 底部间距 */
.revive .revive-time {
  margin-bottom: 4px;
}
.badge{
  font-size:13px; font-weight:bold; color:#c0392b;
  text-align:center;
}

/* 描述 - Boss类型特殊布局 */
.desc{
  grid-area:desc;
  background:#eef7ff;
  display:grid;
  place-items:center;
  font-size:13px;
  border-left:1px solid #ddd;
  padding:0 4px;
}
/* Boss类怪物描述区域两列平分 */
.card.boss-type .desc {
  display:grid;
  grid-template-columns:1fr;
  place-items:center;
  text-align:left;
  gap:4px;
  padding:8px;
}
/* BOSS 卡片：暗金色高级边框 */
.card.boss-type {
  border: 2px solid #992626; /* 主边框 */
  box-shadow: 0 0 6px rgba(153, 38, 38, 0.3); /* 发光 */
  background: #fffbfb; /* 背景 */
}

/* 平板适配 */
@media (min-width:768px) and (max-width:1023px) {
  .name{font-size:17px;}
  .level{font-size:15px;}
  .zone{font-size:14px;}
  .drops{font-size:16px;}
  .drops img{width:22px;height:22px;}
}

/* PC适配 */
@media (min-width:1024px) {
  .name{font-size:18px;}
  .level{font-size:16px;}
  .zone{font-size:15px;}
  .drops{font-size:17px;}
  .drops img{width:24px;height:24px;}
}
</style>

<!-- 顶部 -->
<div class="top-bar">
  <input class="search-box" placeholder="搜索名字/等级/地图/物品">
  <button class="lang-btn">中文/English</button>
</div>

<!-- 地区 -->
<div class="zone-bar" id="zoneBar"></div>

<!-- 顶部翻页 -->
<div class="pagination" id="topPagination">
  <button class="page-btn" id="prevTop">上一页</button>
  <span id="pageInfo">第 1 页</span>
  <button class="page-btn" id="nextTop">下一页</button>
</div>

<!-- 卡片列表 -->
<div class="grid" id="cardBox"></div>

<!-- 底部翻页（新增） -->
<div class="pagination" id="bottomPagination">
  <button class="page-btn" id="prevBot">上一页</button>
  <span id="pageInfoBot">第 1 页</span>
  <button class="page-btn" id="nextBot">下一页</button>
</div>

<script>
let isCN = true
let allMonsters = []
let filtered = []
let lang = {}
let drops = {}
let page = 1

// ====================== 自动判断设备 ======================
const isMobile = window.innerWidth < 768
const isTablet = window.innerWidth >= 768 && window.innerWidth < 1024
const isPC = window.innerWidth >= 1024
const perPage = isPC ? 20 : 10  // PC20个 手机10个

let currentGroup = "all"

const zoneGroups = {
  "木木森/木木林": ["Woody-Weedy Forest,Woody-Wordy Forest"],
  "蘑菇林": ["Mushroom Marshland","Mushroom Spore"],
  "海滩/灯塔岛": ["Wingfril Island Beach","Island with the Lighthouse"],
  "灯塔": ["Lighthouse 1F","Lighthouse 2F","Lighthouse 3F","Lighthouse 4F","Lighthouse 5F"],
  "海盗船": ["Pirate Ship 1F","Pirate Ship 2F"],
  "拉诺斯平原/坟墓森林": ["Lanos Plains","Forest of Grave"],
  "废墟森林/卡塔勒山脉": ["Forest with Ruins","Kataru Mountains"],
  "污染森林": ["Polluted Forest"],
  "天空城": ["Sky Castle"],
  "光绝神殿": ["Temple of Wingfril"],
  "干旱草原/沙漠峡谷": ["Arid Grassland","Desert Valley"],
  "热砂平原": ["Hot Sand Plains"],
  "死亡沼泽": ["Marsh of Death"],
  "森林迷宫": ["Maze Forest"],
  "伊斯洛实验室": ["Islot's Lab","Syphnel Road"],
  "伊斯洛神殿": ["Islot's Temple"],
  "悲叹祭坛": ["Anguish Altar"],
  "鲁纳夫": ["Lunarf"],
  "莫勒波西兹": ["Morphosis Root","Morphosis Garden"],
  "图书库": ["Morphosis Forbidden Library"]
}

Promise.all([
  fetch('monsters_data.json').then(r=>r.json()),
  fetch('lang.json').then(r=>r.json()),
  fetch('monster_drops.json').then(r=>r.json())
]).then(([m,l,d])=>{
  allMonsters = m
  lang = l
  drops = d
  buildGroupButtons()
  doSearch()
}).catch(err=>console.error("加载失败",err))

function tr(map, key){
  return isCN ? (map[key] || key) : key
}

function buildGroupButtons(){
  const bar = document.getElementById('zoneBar')
  bar.innerHTML = `<button class="zone-btn active" id="resetAll">全部</button>`
  document.getElementById('resetAll').onclick = () => {
    currentGroup = "all"
    page = 1
    doSearch()
    setActiveBtn("all")
  }
  Object.keys(zoneGroups).forEach(name => {
    const btn = document.createElement('button')
    btn.className = 'zone-btn'
    btn.textContent = name
    btn.onclick = () => {
      currentGroup = name
      page = 1
      doSearch()
      setActiveBtn(name)
    }
    bar.appendChild(btn)
  })
}

function setActiveBtn(name){
  document.querySelectorAll('.zone-btn').forEach(b=>b.classList.remove('active'))
  if(name === "all") document.getElementById('resetAll').classList.add('active')
  else document.querySelectorAll('.zone-btn').forEach(b=>{
    if(b.textContent === name) b.classList.add('active')
  })
}

function doSearch(){
  const kw = document.querySelector('.search-box').value.toLowerCase().trim()
  filtered = (allMonsters||[]).filter(m => {
    if(!m) return false
    const nameCN = tr(lang.nameMap, m.name)
    const zoneCN = tr(lang.zoneMap, m.zone)
    const lv = String(m.level||'').toLowerCase()
    const items = (drops[m.name]?.掉落物||[]).map(i=>tr(lang.dropMap,i)).join(' ')
    // 新增：加入怪物类型搜索
    const monsterType = (m.notes||"").toLowerCase()
    const txt = [nameCN, m.name, zoneCN, m.zone, lv, items, monsterType].join(' ').toLowerCase()
    let ok = true
    if(currentGroup !== "all"){
      const zs = zoneGroups[currentGroup]||[]
      ok = zs.some(z=>m.zone==z||m.zone.includes(z)||z.includes(m.zone))
    }
    return txt.includes(kw) && ok
  })
  render()
}

function updatePageInfo(){
  const total = Math.ceil((filtered.length||0)/perPage)
  document.getElementById('pageInfo').innerText = `第 ${page}/${total} 页`
  document.getElementById('pageInfoBot').innerText = `第 ${page}/${total} 页`
}

function goPrev(){
  if(page>1){page--;render();}
}
function goNext(){
  const total = Math.ceil(filtered.length/perPage)
  if(page<total){
    page++;
    render();
    // 点击下一页跳转到顶部
    window.scrollTo({
      top: 0,
      behavior: 'smooth' // 平滑滚动
    });
  }
}

function render(){
  const box = document.getElementById('cardBox')
  box.innerHTML = ''
  updatePageInfo()
  const list = filtered.slice((page-1)*perPage, page*perPage)

  list.forEach(m => {
    if(!m) return
    const name = tr(lang.nameMap, m.name)
    const zone = tr(lang.zoneMap, m.zone)
    const dropHtml = (drops[m.name]?.掉落物||[]).map(i => {
      return `<div><img src="drop_icons/${i}.png" onerror="this.style.display='none'">${tr(lang.dropMap,i)}</div>`
    }).join('')

    let reviveText = ""
    if(m.revive?.trim()){
      let txt = m.revive
      if(!isCN) txt = txt.replace(/小时/g,"h").replace(/分/g,"m").replace(/秒/g,"s").trim()
      reviveText = txt
    }

    const img = `monsters_images/${m.name}.png`
    let badge = ""
    let isBossType = false
    const note = (m.notes||"").trim()
    // 检测所有Boss类型
    if(note.includes("Mini-Boss")) {
      badge = `<div class="badge">Mini Boss</div>`
      isBossType = true
    } else if(note.includes("Boss")) {
      badge = `<div class="badge">Boss</div>`
      isBossType = true
    } else if(note.includes("Raid Boss")) {
      badge = `<div class="badge">Raid Boss</div>`
      isBossType = true
    }

    // 处理Boss类型描述内容的两列显示
    let descHtml = m.desc || ''
    if(isBossType && descHtml) {
      // 将描述内容拆分为两列（简单按逗号分割，可根据实际需求调整）
      const descParts = descHtml.split('，').filter(part => part.trim())
      if(descParts.length > 1) {
        descHtml = `
          <div>${descParts[0].trim()}</div>
          <div>${descParts.slice(1).join('，').trim()}</div>
        `
      } else {
        // 如果只有一列，也保持两列结构
        descHtml = `
          <div>${descHtml}</div>
          <div></div>
        `
      }
    }

    // 卡片类名：Boss类型添加特殊类名
    const cardClass = isBossType ? 'card boss-type' : 'card'

    box.innerHTML += `
    <div class="${cardClass}">
      <div class="avatar">
        <img src="${img}" onerror="this.src='https://picsum.photos/64'">
        <div class="hp">HP: ${m.hp||'?'}</div>
      </div>
      <div class="info">
        <div class="name">${name}</div>
        <div class="level">Lv.${m.level||'?'}</div>
        <div class="zone">${zone}</div>
      </div>
      <div class="revive">
        <div class="exp">EXP: ${m.exp||'?'}</div>
        ${badge}
        <div class="revive-time">${reviveText}</div>
      </div>
      <div class="drops">${dropHtml}</div>
      <div class="desc">${descHtml}</div>
    </div>`
  })
}

// 搜索
document.querySelector('.search-box').addEventListener('input', doSearch)

// 语言切换
document.querySelector('.lang-btn').onclick = ()=>{
  isCN = !isCN
  document.querySelector('.lang-btn').textContent = isCN ? "中文/English" : "English/中文"
  render()
}

// 顶部翻页
document.getElementById('prevTop').onclick = goPrev
document.getElementById('nextTop').onclick = goNext

// 底部翻页（新增）
document.getElementById('prevBot').onclick = goPrev
document.getElementById('nextBot').onclick = goNext
</script>
